services:
  postgres:
    image: postgres:15.3
    container_name: yupi-postgres
    restart: always

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - yupi_pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: yupi-kafka
    restart: always

    env_file:
      - .env

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"

      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      CLUSTER_ID: "${KAFKA_CLUSTER_ID}"

      # LISTENERS
      KAFKA_LISTENERS: "PLAINTEXT://:9092,EXTERNAL://:29092,CONTROLLER://:9093"

      # INTERNAL + EXTERNAL
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://192.168.137.50:29092"

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"

      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

    ports:
      - "9092:9092"
      - "29092:29092"

    volumes:
      - yupi_kafkadata:/var/lib/kafka/data

  gateway:
    build:
      context: .
      dockerfile: ./00-gateway/Dockerfile
    container_name: yupi-gateway
    restart: always
    env_file:
      - ./00-gateway/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BROKER: kafka:9092
      KAFKA_CLIENT_ID: gateway-client
      AUTH_SERVICE_URL: http://auth:3010
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  auth:
    build:
      context: .
      dockerfile: ./01-auth/Dockerfile
    container_name: yupi-auth
    restart: always
    env_file:
      - ./01-auth/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BROKER: kafka:9092
      KAFKA_CLIENT_ID: auth-service-client
      KAFKA_GROUP_ID: auth-group
      PORT: 3010
    ports:
      - "3010:3010"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  wallet:
    build:
      context: .
      dockerfile: ./02-wallet/Dockerfile
    container_name: yupi-wallet
    restart: always
    env_file:
      - ./02-wallet/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BROKER: kafka:9092
      KAFKA_CLIENT_ID: wallet-service-client
      KAFKA_GROUP_ID: wallet-group
      PORT: 3020
    ports:
      - "3020:3020"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  payments:
    build:
      context: .
      dockerfile: ./03-payments/Dockerfile
    container_name: yupi-payments
    restart: always
    env_file:
      - ./03-payments/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BROKER: kafka:9092
      KAFKA_CLIENT_ID: payments-service-client
      KAFKA_GROUP_ID: payments-group
      PORT: 3030
    ports:
      - "3030:3030"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  saga:
    build:
      context: .
      dockerfile: ./05-saga/Dockerfile
    container_name: yupi-saga
    restart: always
    env_file:
      - ./05-saga/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BROKER: kafka:9092
      KAFKA_CLIENT_ID: saga-service-client
      KAFKA_GROUP_ID: saga-group
      PORT: 3050
    ports:
      - "3050:3050"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  projections:
    build:
      context: .
      dockerfile: ./06-projections/Dockerfile
    container_name: yupi-projections
    restart: always
    env_file:
      - ./06-projections/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BROKER: kafka:9092
      KAFKA_CLIENT_ID: projections-service-client
      KAFKA_GROUP_ID: projections-group
      PORT: 3060
    ports:
      - "3060:3060"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  logging:
    build:
      context: .
      dockerfile: ./04-logging/Dockerfile
    container_name: yupi-logging
    restart: always
    env_file:
      - ./04-logging/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BROKER: kafka:9092
      KAFKA_CLIENT_ID: logging-service-client
      KAFKA_GROUP_ID: logging-group
      PORT: 3040
    ports:
      - "3040:3040"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

volumes:
  yupi_pgdata:
  yupi_kafkadata:
