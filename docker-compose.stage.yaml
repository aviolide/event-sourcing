services:
  postgres:
    image: postgres:15.3
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-wallet_test}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - stage_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: always
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      CLUSTER_ID: "${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,HOST://:9094,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    ports:
      - "${KAFKA_PORT:-9092}:9094"
    volumes:
      - stage_kafkadata:/var/lib/kafka/data

  auth:
    build:
      context: ./01-auth
      dockerfile: Dockerfile
    restart: always
    profiles: ["services"]
    environment:
      PORT: 3010
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-wallet_test}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BROKER: kafka:9092
      KAFKA_CLIENT_ID: auth-stage-client
      JWT_SECRET: ${JWT_SECRET:-stage-jwt-secret-that-is-at-least-32-chars!!}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-stage-refresh-secret-that-is-at-least-32-chars}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
    ports:
      - "${AUTH_PORT:-3010}:3010"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  wallet:
    build:
      context: ./02-wallet
      dockerfile: Dockerfile
    restart: always
    profiles: ["services"]
    environment:
      NODE_ENV: test
      PORT: 3020
      SERVICE_NAME: wallet-stage-service
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-wallet_test}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BROKER: kafka:9092
      KAFKA_CLIENT_ID: wallet-stage-client
      KAFKA_GROUP_ID: wallet-stage-group
    ports:
      - "${WALLET_PORT:-3020}:3020"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  payments:
    build:
      context: ./03-payments
      dockerfile: Dockerfile
    restart: always
    profiles: ["services"]
    environment:
      PORT: 3030
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-wallet_test}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BROKER: kafka:9092
      KAFKA_CLIENT_ID: payments-stage-client
      KAFKA_GROUP_ID: payments-stage-group
      JWT_SECRET: ${JWT_SECRET:-stage-jwt-secret-that-is-at-least-32-chars!!}
      WALLET_SERVICE_URL: http://wallet:3020
    ports:
      - "${PAYMENTS_PORT:-3030}:3030"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      wallet:
        condition: service_started

  logging:
    build:
      context: ./04-logging
      dockerfile: Dockerfile
    restart: always
    profiles: ["services"]
    environment:
      PORT: 3040
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-wallet_test}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BROKER: kafka:9092
      KAFKA_CLIENT_ID: logging-stage-client
      KAFKA_GROUP_ID: logging-stage-group
    ports:
      - "${LOGGING_PORT:-3040}:3040"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  gateway:
    build:
      context: ./00-gateway
      dockerfile: Dockerfile
    restart: always
    profiles: ["services"]
    environment:
      NODE_ENV: test
      PORT: 3000
      AUTH_SERVICE_URL: http://auth:3010
      WALLET_SERVICE_URL: http://wallet:3020
      PAYMENTS_SERVICE_URL: http://payments:3030
      JWT_SECRET: ${JWT_SECRET:-stage-jwt-secret-that-is-at-least-32-chars!!}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-1200}
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    depends_on:
      auth:
        condition: service_started
      wallet:
        condition: service_started
      payments:
        condition: service_started

volumes:
  stage_pgdata:
  stage_kafkadata:
