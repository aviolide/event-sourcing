<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Log — Live Stream</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    #status {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
    }
    #status.connected { background: var(--green); }
    #status.error { background: var(--red); }
    #counter { color: var(--muted); font-size: 0.875rem; margin-left: auto; }
    main { padding: 1rem 1.5rem; }
    #events {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .event-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      animation: slideIn 0.3s ease;
    }
    .event-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .topic-badge {
      background: var(--accent);
      color: var(--bg);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      text-transform: uppercase;
    }
    .topic-badge.user { background: #a371f7; }
    .topic-badge.wallet { background: var(--green); }
    .topic-badge.payment { background: var(--yellow); }
    .event-time { color: var(--muted); font-size: 0.75rem; margin-left: auto; }
    .event-body {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.8125rem;
      color: var(--muted);
      background: var(--bg);
      padding: 0.5rem;
      border-radius: 4px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <header>
    <span id="status"></span>
    <h1>Event Log</h1>
    <span id="counter">0 events</span>
  </header>
  <main>
    <div id="events">
      <div class="empty-state" id="empty">Waiting for events&hellip;</div>
    </div>
  </main>

  <script>
    const eventsEl  = document.getElementById('events');
    const statusEl  = document.getElementById('status');
    const counterEl = document.getElementById('counter');
    const emptyEl   = document.getElementById('empty');
    let count = 0;

    function topicClass(topic) {
      if (topic.startsWith('user.'))    return 'user';
      if (topic.startsWith('wallet.'))  return 'wallet';
      if (topic.startsWith('payment.')) return 'payment';
      return '';
    }

    function renderEvent(ev) {
      if (emptyEl) emptyEl.remove();
      count++;
      counterEl.textContent = count + ' event' + (count === 1 ? '' : 's');

      const card = document.createElement('div');
      card.className = 'event-card';

      const time = new Date(ev.receivedAt).toLocaleTimeString();
      card.innerHTML =
        '<div class="event-header">' +
          '<span class="topic-badge ' + topicClass(ev.topic) + '">' + ev.topic + '</span>' +
          (ev.key ? '<span style="color:var(--muted);font-size:0.75rem">key: ' + ev.key + '</span>' : '') +
          '<span class="event-time">' + time + '</span>' +
        '</div>' +
        '<div class="event-body">' + JSON.stringify(ev.payload, null, 2) + '</div>';

      eventsEl.prepend(card);
    }

    function loadHistory() {
      fetch('/events?limit=50')
        .then(function (r) { return r.json(); })
        .then(function (list) {
          list.reverse().forEach(renderEvent);
        })
        .catch(function () {});
    }

    function connect() {
      const source = new EventSource('/events/stream');

      source.addEventListener('event', function (e) {
        var ev = JSON.parse(e.data);
        renderEvent(ev);
      });

      source.onopen = function () {
        statusEl.className = 'connected';
      };

      source.onerror = function () {
        statusEl.className = 'error';
        source.close();
        setTimeout(connect, 3000);
      };
    }

    loadHistory();
    connect();
  </script>
</body>
</html>
